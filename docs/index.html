<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT SkyWalker541 Shader In Action</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 36px;
  }

  .title-sub {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #6a4fc4;
    margin-bottom: 10px;
  }

  .title-main {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(22px, 5vw, 48px);
    letter-spacing: 3px;
    line-height: 1.1;
    background: linear-gradient(135deg, #c084fc 0%, #a855f7 40%, #7c3aed 70%, #4f46e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(168, 85, 247, 0.4));
  }

  .title-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 14px;
  }

  .line-accent {
    height: 1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, #7c3aed);
  }
  .line-accent.right {
    background: linear-gradient(90deg, #7c3aed, transparent);
  }

  .title-tag {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #4f46e5;
  }

  .handheld-wrapper {
    opacity: 0;
    transition: opacity 0.4s ease;
    position: relative;
    display: inline-block;
    width: clamp(220px, 38vw, 420px);
    filter: drop-shadow(0 0 30px rgba(124, 58, 237, 0.3)) drop-shadow(0 0 70px rgba(124, 58, 237, 0.11));
  }

  .handheld-wrapper img.device {
    width: 100%;
    height: auto;
    display: block;
  }

  .screen-overlay {
    position: absolute;
    top:           5.0%;
    left:          8.9%;
    width:         82.1%;
    aspect-ratio:  1240 / 1080;
    overflow:      hidden;
    border-radius: 5px;
    background:    #000;
  }

  .screen-overlay video {
    width:      100%;
    height:     100%;
    object-fit: cover;
    display:    block;
  }

  /* Game selector pills */
  .game-selector {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .game-pill {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #2a1f4a;
    background: transparent;
    color: #4a3a72;
    cursor: pointer;
    transition: all 0.2s;
  }
  .game-pill:hover {
    border-color: #6a4fc4;
    color: #8a6fe4;
  }
  .game-pill.active {
    border-color: #7c3aed;
    color: #c084fc;
    background: rgba(124, 58, 237, 0.1);
  }

  /* Credit */
  .credit {
    margin-top: 28px;
    text-align: center;
  }
  .credit .credit-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .credit .credit-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #6a5a9a;
  }
  .credit a {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 6px;
    color: #7a6aaa;
    text-decoration: none;
    transition: color 0.2s;
  }
  .credit a:hover { color: #9f7fff; }

  .also-by {
    margin-top: 48px;
    padding-top: 36px;
    border-top: 1px solid #1a1228;
    text-align: center;
  }
  .also-by .also-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .also-by .also-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    color: #6a5a9a;
    transition: color 0.2s;
  }
  .also-by .also-text:hover {
    color: #9f7fff;
  }
  .also-by a {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 6px;
    color: #7a6aaa;
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
    display: inline-block;
    pointer-events: all;
    position: relative;
    z-index: 10;
  }
  .also-by a:hover { color: #9f7fff !important; }
  .also-line a {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    color: #6a5a9a;
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }
  .also-line a:hover { color: #9f7fff !important; }
</style>
</head>
<body>

  <div class="title-wrap">
    <a href="https://github.com/SkyWalker541/PT-SkyWalker541" target="_blank" style="text-decoration:none;"><h1 class="title-main">PT SkyWalker541<br>Shader</h1></a>
    <svg width="500" height="30" viewBox="0 0 500 30" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:16px auto;">
      <line x1="100" y1="6" x2="400" y2="6" stroke="#2d1245" stroke-width="0.75" style="filter:drop-shadow(0 0 2px #4a1a6a)"/>
      <line x1="50" y1="15" x2="450" y2="15" stroke="#6b21a8" stroke-width="1.25" style="filter:drop-shadow(0 0 4px #6b21a8)"/>
      <line x1="5" y1="24" x2="495" y2="24" stroke="#a855f7" stroke-width="1.75" style="filter:drop-shadow(0 0 6px #a855f7)"/>
    </svg>
    <div class="title-line">
      <div class="line-accent"></div>
      <span class="title-tag">gameplay showcase</span>
      <div class="line-accent right"></div>
    </div>
    <div class="game-selector" style="margin-top: 20px; margin-bottom: 0;">
      <button class="game-pill active" onclick="selectGame(0, this)">Bark Sequelo</button>
      <button class="game-pill" onclick="selectGame(1, this)">Black Castle 2</button>
      <button class="game-pill" onclick="selectGame(2, this)">Entomophobia DX</button>
    </div>
    <div class="credit" style="margin-top: 16px; margin-bottom: 0;">
      <div class="credit-line">
        <div class="line-accent"></div>
        <span class="credit-text">featured game</span>
        <div class="line-accent right"></div>
      </div>
      <a id="credit-link" href="https://polynaut.itch.io/bark-sequelo" target="_blank">Bark Sequelo by Polynaut</a>
    </div>
  </div>


  <div class="handheld-wrapper">
    <img class="device" src="Handheld_Generic.png" alt="PT SkyWalker541 handheld console" onload="this.closest('.handheld-wrapper').style.opacity='1'">
    <div class="screen-overlay">
      <video id="game-video" autoplay loop muted playsinline src="https://res.cloudinary.com/di0ydhfv8/video/upload/v1780770794/gameplay_tgfjdo.mp4"></video>
    </div>
  </div>



<script>
  const games = [
    {
      video:  'https://res.cloudinary.com/di0ydhfv8/video/upload/v1780770794/gameplay_tgfjdo.mp4',
      label:  'Bark Sequelo by Polynaut',
      url:    'https://polynaut.itch.io/bark-sequelo'
    },
    {
      video:  'https://res.cloudinary.com/di0ydhfv8/video/upload/v1780771001/gameplay2_t1ulwy.mp4',
      label:  'Black Castle 2 by User0x7f',
      url:    'https://user0x7f.itch.io/black-castle-2'
    },
    {
      video:  'https://res.cloudinary.com/di0ydhfv8/video/upload/v1780770975/gameplay3_xxxkwx.mp4',
      label:  'Entomophobia DX by drgd_retro',
      url:    'https://drgd-retro.itch.io/entomophobia-dx'
    }
  ];

  function selectGame(index, btn) {
    const g = games[index];

    // Swap video
    const vid = document.getElementById('game-video');
    vid.src = g.video;
    vid.load();
    vid.play();

    // Update credit
    const link = document.getElementById('credit-link');
    link.textContent = g.label;
    link.href = g.url;

    // Update active pill
    document.querySelectorAll('.game-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

  <div class="also-by">
    <div class="also-line">
      <div class="line-accent"></div>
      <span class="also-text">GET THE SHADER HERE</span>
      <div class="line-accent right"></div>
    </div>
    <a href="https://github.com/SkyWalker541/PT-SkyWalker541" target="_blank">PT SkyWalker541 Shader</a>
  </div>

  <div class="also-by">
    <div class="also-line">
      <div class="line-accent"></div>
      <span class="also-text">ALSO BY SkyWalker541</span>
      <div class="line-accent right"></div>
    </div>
    <a href="https://github.com/SkyWalker541/Retroid-Pocket-Classic-Overlays" target="_blank">Retroid Pocket Classic Overlays</a>
  </div>

</body>
</html>
