<script>

(function(){

const gameCanvas = document.getElementById('game-canvas');
const ctx = gameCanvas.getContext('2d');

function resizeGameCanvas() {
  const so = document.querySelector('.screen-overlay');
  gameCanvas.width  = so ? so.offsetWidth  : gameCanvas.offsetWidth  || 200;
  gameCanvas.height = so ? so.offsetHeight : gameCanvas.offsetHeight || 174;
}
window.addEventListener('resize', resizeGameCanvas);

// ── GAME CANVAS ───────────────────────────────────────────────────────────────
// ── DIFFICULTY ────────────────────────────────────────────────────────────────
let difficulty = localStorage.getItem('pt_difficulty') || 'normal';
let highScore  = parseInt(localStorage.getItem('pt_hiscore') || '0');
let menuOpen   = false;

const DIFF = {
  easy:   {speed:0.25, fireMin:120, fireRand:200, count:(w)=>1},
  normal: {speed:0.40, fireMin:80,  fireRand:160, count:(w)=>1+Math.floor(w/3)},
  hard:   {speed:0.60, fireMin:50,  fireRand:100, count:(w)=>1+Math.floor(w/2)},
};

// ── GAME STATE ────────────────────────────────────────────────────────────────
const SCALE = 0.8;
let gameState = 'idle';
let score=0, lives=3, wave=1, lastTime=0, shootCooldown=0, invincible=0, prevFireState=false;
const player = {x:0,y:0,angle:0,vx:0,vy:0,maxSpeed:2.5};
let enemies=[], gameStars=[];
const lasers=[];

const pool = Array.from({length:200}, ()=>({life:0}));
function emit(x,y,angle,type,n){
  let s=0;
  for(const p of pool){
    if(p.life<=0){
      p.x=x; p.y=y;
      const spd=0.5+Math.random()*2, da=(Math.random()-0.5)*0.6;
      p.vx=Math.cos(angle+Math.PI+da)*spd; p.vy=Math.sin(angle+Math.PI+da)*spd;
      p.life=1; p.decay=0.03+Math.random()*0.05; p.size=0.5+Math.random()*1.5; p.type=type;
      if(++s>=n) break;
    }
  }
}

function drawParticles(){
  for(const p of pool){
    if(p.life<=0) continue;
    p.life-=p.decay; p.x+=p.vx; p.y+=p.vy;
    const a=Math.max(0,p.life*0.9);
    ctx.fillStyle = p.type==='thruster'?`rgba(255,${100+Math.floor(p.life*120)},30,${a})`:
                    p.type==='enemy'?`rgba(200,50,50,${a})`:`rgba(255,220,50,${a})`;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.size),Math.ceil(p.size));
  }
}

function initGameStars(){
  gameStars=[];
  for(let i=0;i<60;i++) gameStars.push({x:Math.random()*gameCanvas.width,y:Math.random()*gameCanvas.height,size:Math.random()>0.8?2:1,alpha:0.05+Math.random()*0.12,twinkles:Math.random()>0.6,speed:0.01+Math.random()*0.02,offset:Math.random()*Math.PI*2});
}

function drawGameStars(t){
  for(const s of gameStars){
    let a=s.alpha;
    if(s.twinkles) a*=(0.3+0.7*(0.5+0.5*Math.sin(t*s.speed*60+s.offset)));
    ctx.fillStyle=`rgba(200,150,255,${a})`;
    ctx.fillRect(Math.floor(s.x),Math.floor(s.y),s.size,s.size);
  }
}

class Enemy{
  constructor(){
    const W=gameCanvas.width,H=gameCanvas.height,edge=Math.floor(Math.random()*4);
    if(edge===0){this.x=W+20;this.y=Math.random()*H;}
    else if(edge===1){this.x=-20;this.y=Math.random()*H;}
    else if(edge===2){this.x=Math.random()*W;this.y=-20;}
    else{this.x=Math.random()*W;this.y=H+20;}
    const d=DIFF[difficulty];
    this.speed=d.speed+Math.random()*0.3+wave*0.02;
    this.hp=1; this.laserTimer=Math.floor(Math.random()*d.fireRand)+d.fireMin;
    this.wobble=0; this.wobbleTimer=0;
  }
  update(){
    const dx=player.x-this.x,dy=player.y-this.y,dist=Math.hypot(dx,dy)+0.001,angle=Math.atan2(dy,dx);
    this.wobbleTimer++; if(this.wobbleTimer>40){this.wobble=(Math.random()-0.5)*1.2;this.wobbleTimer=0;}
    const ta=angle+this.wobble*0.3;
    this.x+=Math.cos(ta)*this.speed; this.y+=Math.sin(ta)*this.speed;
    if(dist<50){this.x-=(dx/dist)*0.3;this.y-=(dy/dist)*0.3;}
    this.laserTimer--;
    if(this.laserTimer<=0){
      lasers.push(new Laser(this.x,this.y,angle,false,6,5,0.02));
      const d2=DIFF[difficulty]; this.laserTimer=Math.max(d2.fireMin,Math.floor(Math.random()*d2.fireRand)+d2.fireMin);
    }
    emit(this.x+EW*SCALE*0.4,this.y,angle,'enemy',1);
  }
  draw(){drawSprite(ctx,enemyPixels,enemyColors,EW,EH,this.x,this.y,SCALE,this.x<player.x);}
}

function spawnWave(){enemies=[];const count=Math.max(1,DIFF[difficulty].count(wave));for(let i=0;i<count;i++)enemies.push(new Enemy());}

const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
const dpad={up:false,down:false,left:false,right:false,fire:false};
let dpadPointerId = null;

function syncDpadButtonState(){
  ['up','down','left','right'].forEach(dir=>{
    const el = document.getElementById('dpad-' + dir);
    if(!el) return;
    el.classList.toggle('pressed', dpad[dir]);
  });
}

function updateDpadFromPoint(clientX, clientY){
  const zone = document.getElementById('dpad-zone');
  if(!zone) return;
  const rect = zone.getBoundingClientRect();
  const dx = clientX - (rect.left + rect.width / 2);
  const dy = clientY - (rect.top + rect.height / 2);
  const nx = dx / (rect.width / 2);
  const ny = dy / (rect.height / 2);
  const threshold = 0.25;
  dpad.left  = nx < -threshold;
  dpad.right = nx >  threshold;
  dpad.up    = ny < -threshold;
  dpad.down  = ny >  threshold;
  syncDpadButtonState();
}

function clearDpad(){
  dpad.up = dpad.down = dpad.left = dpad.right = false;
  syncDpadButtonState();
}

function setupTouch(){
  // Prevent double-tap zoom and scrolling while the game is active.
  let lastTouchTime = 0;
  document.addEventListener('touchstart', e=>{
    if(document.body.classList.contains('game-mode')){
      const now = performance.now();
      if(now - lastTouchTime < 300){
        e.preventDefault();
      }
      lastTouchTime = now;
    }
  }, {passive:false});

  const hw = document.querySelector('.handheld-wrapper');
  if(hw){
    hw.addEventListener('touchmove', e=>{
      if(document.body.classList.contains('game-mode')) e.preventDefault();
    }, {passive:false});
  }
  document.addEventListener('touchmove', e=>{
    if(document.body.classList.contains('game-mode')) e.preventDefault();
  }, {passive:false});

  const zone = document.getElementById('dpad-zone');
  if(zone){
    zone.addEventListener('pointerdown', e=>{
      if(e.pointerType==='touch' || e.pointerType==='pen'){
        dpadPointerId = e.pointerId;
        zone.setPointerCapture(e.pointerId);
        updateDpadFromPoint(e.clientX, e.clientY);
        e.preventDefault();
        e.stopPropagation();
      }
    });
    zone.addEventListener('pointermove', e=>{
      if(e.pointerId===dpadPointerId && (e.pointerType==='touch' || e.pointerType==='pen')){
        updateDpadFromPoint(e.clientX, e.clientY);
      }
    });
    zone.addEventListener('pointerup', e=>{
      if(e.pointerId===dpadPointerId){
        dpadPointerId = null;
        clearDpad();
      }
    });
    zone.addEventListener('pointercancel', e=>{
      if(e.pointerId===dpadPointerId){
        dpadPointerId = null;
        clearDpad();
      }
    });
    zone.addEventListener('touchstart', e=>{
      if(document.body.classList.contains('game-mode')){
        updateDpadFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, {passive:false});
    zone.addEventListener('touchmove', e=>{
      if(document.body.classList.contains('game-mode')){
        updateDpadFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
      }
    }, {passive:false});
    zone.addEventListener('touchend', e=>{
      clearDpad();
    });
  }

  let activeControlPointerId = null;
  let activeControlElement = null;

  function resetActiveControl(){
    if(activeControlElement){
      activeControlElement.classList.remove('pressed');
      if(activeControlElement.id==='btn-a' || activeControlElement.id==='btn-b') dpad.fire = false;
      activeControlElement = null;
    }
  }

  function handleWrapperPointerDown(e){
    if(!document.body.classList.contains('game-mode')) return;
    if(e.pointerType!=='touch' && e.pointerType!=='pen') return;
    const pointEl = document.elementFromPoint(e.clientX, e.clientY);
    if(!pointEl) return;
    const target = pointEl.closest('#btn-a, #btn-b, #btn-select, #btn-start, #dpad-zone, .dpad-btn');
    if(!target) return;
    if(target.id==='dpad-zone' || target.classList.contains('dpad-btn')){
      dpadPointerId = e.pointerId;
      e.currentTarget.setPointerCapture(e.pointerId);
      updateDpadFromPoint(e.clientX, e.clientY);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(target.id==='btn-a' || target.id==='btn-b'){
      activeControlElement = target;
      activeControlPointerId = e.pointerId;
      activeControlElement.classList.add('pressed');
      dpad.fire = true;
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(target.id==='btn-select' || target.id==='btn-start'){
      activeControlElement = target;
      activeControlPointerId = e.pointerId;
      activeControlElement.classList.add('pressed');
      e.preventDefault();
      e.stopPropagation();
      return;
    }
  }

  function handleWrapperPointerMove(e){
    if(e.pointerId===dpadPointerId && (e.pointerType==='touch' || e.pointerType==='pen')){
      updateDpadFromPoint(e.clientX, e.clientY);
    }
  }

  function handleWrapperPointerUp(e){
    if(e.pointerId===dpadPointerId){
      dpadPointerId = null;
      clearDpad();
    }
    if(e.pointerId===activeControlPointerId){
      if(activeControlElement){
        if(activeControlElement.id==='btn-select') handleSelect();
        if(activeControlElement.id==='btn-start') handleStart();
        activeControlElement.classList.remove('pressed');
        if(activeControlElement.id==='btn-a' || activeControlElement.id==='btn-b') dpad.fire = false;
      }
      activeControlPointerId = null;
      activeControlElement = null;
    }
  }

  if(hw){
    hw.addEventListener('pointerdown', handleWrapperPointerDown);
    hw.addEventListener('pointermove', handleWrapperPointerMove);
    hw.addEventListener('pointerup', handleWrapperPointerUp);
    hw.addEventListener('pointercancel', handleWrapperPointerUp);
  }

  function press(dir,el){
    el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();dpad[dir]=true;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();dpad[dir]=false;el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',()=>{dpad[dir]=false;el.classList.remove('pressed');});
    el.addEventListener('pointerdown',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();dpad[dir]=true;el.classList.add('pressed');}});
    el.addEventListener('pointerup',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();dpad[dir]=false;el.classList.remove('pressed');}});
    el.addEventListener('pointercancel',()=>{dpad[dir]=false;el.classList.remove('pressed');});
    el.addEventListener('mousedown',()=>{dpad[dir]=true;el.classList.add('pressed');});
    el.addEventListener('mouseup',()=>{dpad[dir]=false;el.classList.remove('pressed');});
    el.addEventListener('mouseleave',()=>{dpad[dir]=false;el.classList.remove('pressed');});
  }
  press('up',document.getElementById('dpad-up'));
  press('down',document.getElementById('dpad-down'));
  press('left',document.getElementById('dpad-left'));
  press('right',document.getElementById('dpad-right'));
  ['btn-a','btn-b'].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();dpad.fire=true;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();dpad.fire=false;el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',()=>{dpad.fire=false;el.classList.remove('pressed');});
    el.addEventListener('pointerdown',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();dpad.fire=true;el.classList.add('pressed');}});
    el.addEventListener('pointerup',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();dpad.fire=false;el.classList.remove('pressed');}});
    el.addEventListener('pointercancel',()=>{dpad.fire=false;el.classList.remove('pressed');});
    el.addEventListener('mousedown',()=>{dpad.fire=true;el.classList.add('pressed');});
    el.addEventListener('mouseup',()=>{dpad.fire=false;el.classList.remove('pressed');});
    el.addEventListener('mouseleave',()=>{dpad.fire=false;el.classList.remove('pressed');});
  });
}
setupTouch();

const isUp=()=>keys['ArrowUp']||keys['w']||keys['W']||dpad.up;
const isDown=()=>keys['ArrowDown']||keys['s']||keys['S']||dpad.down;
const isLeft=()=>keys['ArrowLeft']||keys['a']||keys['A']||dpad.left;
const isRight=()=>keys['ArrowRight']||keys['d']||keys['D']||dpad.right;
const isFire=()=>keys[' ']||dpad.fire;

// Reset lastTime when tab becomes visible to prevent speedup after pause
document.addEventListener('visibilitychange',()=>{if(!document.hidden) lastTime=0;});

function updateHUD(){
  document.getElementById('hud-score').textContent='SCORE '+String(score).padStart(5,'0');
  document.getElementById('hud-lives').textContent='♦ '.repeat(lives).trim();
}
function showMessage(title,sub,duration){
  const msg=document.getElementById('game-message');
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub;
  msg.style.display='flex';
  if(duration) setTimeout(()=>{msg.style.display='none';},duration);
}

function startGame(){
  resizeGameCanvas();
  if(gameCanvas.width<10){setTimeout(startGame,100);return;}
  score=0;lives=3;wave=1;
  player.x=gameCanvas.width/2;player.y=gameCanvas.height/2;
  player.vx=0;player.vy=0;invincible=120;
  lasers.length=0; initGameStars(); spawnWave();
  gameState='playing'; updateHUD();
  showMessage('WAVE 1','',1500);
}

function playerDie(){
  lives--;updateHUD();invincible=180;
  for(let i=0;i<20;i++) emit(player.x,player.y,Math.random()*Math.PI*2,'spark',1);
  if(lives<=0){
    gameState='gameover';
    if(score>highScore){highScore=score;localStorage.setItem('pt_hiscore',highScore);}
    showMessage('GAME OVER','SCORE '+String(score).padStart(5,'0')+'  BEST '+String(highScore).padStart(5,'0'));
  }
}

function gameLoop(ts){
  if(menuOpen){lastTime=ts;requestAnimationFrame(gameLoop);return;}
  if(lastTime===0) lastTime=ts;
  const dt=Math.min(ts-lastTime,33);lastTime=ts;const t=ts*0.001;
  ctx.fillStyle='#000';ctx.fillRect(0,0,gameCanvas.width,gameCanvas.height);
  drawGameStars(t);
  if(gameState==='playing'){
    const W=gameCanvas.width,H=gameCanvas.height;
    if(isUp())player.vy-=0.18;if(isDown())player.vy+=0.18;
    if(isLeft())player.vx-=0.18;if(isRight())player.vx+=0.18;
    player.vx*=0.88;player.vy*=0.88;
    const spd=Math.hypot(player.vx,player.vy);
    if(spd>player.maxSpeed){player.vx=player.vx/spd*player.maxSpeed;player.vy=player.vy/spd*player.maxSpeed;}
    player.x=Math.max(SW*SCALE/2,Math.min(W-SW*SCALE/2,player.x+player.vx));
    player.y=Math.max(SH*SCALE/2,Math.min(H-SH*SCALE/2,player.y+player.vy));
    if(spd>0.2)player.angle=Math.atan2(player.vy,player.vx);
    if(spd>0.3)emit(player.x-Math.cos(player.angle)*SW*SCALE*0.4,player.y-Math.sin(player.angle)*SH*SCALE*0.2,player.angle,'thruster',1);
    shootCooldown=Math.max(0,shootCooldown-1);
    const currentFire=isFire();
    if(currentFire&&!prevFireState&&shootCooldown<=0){
      let ta=player.angle,nearest=Infinity;
      for(const e of enemies){const d=Math.hypot(e.x-player.x,e.y-player.y);if(d<nearest){nearest=d;ta=Math.atan2(e.y-player.y,e.x-player.x);}}
      lasers.push(new Laser(player.x,player.y,ta,true,6,5,0.02));shootCooldown=15;
    }
    prevFireState=currentFire;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];e.update();
      for(let j=lasers.length-1;j>=0;j--){
        const l=lasers[j];
        if(l.friendly&&Math.hypot(l.x-e.x,l.y-e.y)<EW*SCALE*0.5){
          e.hp--;lasers.splice(j,1);
          if(e.hp<=0){for(let k=0;k<12;k++)emit(e.x,e.y,Math.random()*Math.PI*2,'spark',1);enemies.splice(i,1);score+=100*wave;updateHUD();}
          break;
        }
      }
    }
    if(invincible<=0){
      for(let j=lasers.length-1;j>=0;j--){const l=lasers[j];if(!l.friendly&&Math.hypot(l.x-player.x,l.y-player.y)<SW*SCALE*0.4){lasers.splice(j,1);playerDie();break;}}
      for(const e of enemies){if(Math.hypot(e.x-player.x,e.y-player.y)<SW*SCALE*0.5){playerDie();break;}}
    }
    if(invincible>0)invincible--;
    if(enemies.length===0){wave++;spawnWave();score+=500;updateHUD();showMessage('WAVE '+wave,'',1500);}
    for(let i=lasers.length-1;i>=0;i--)if(!lasers[i].update())lasers.splice(i,1);
    drawParticles();
    for(const l of lasers)l.draw(ctx);
    for(const e of enemies)e.draw();
    if(invincible<=0||Math.floor(invincible/6)%2===0){
      if(invincible>0)ctx.globalAlpha=0.5;
      drawSprite(ctx,saucerPixels,saucerColors,SW,SH,player.x,player.y,SCALE,player.vx<-0.2);
      ctx.globalAlpha=1;
    }
  } else if(gameState==='gameover'){
    drawParticles();for(const l of lasers)l.draw(ctx);
  }
  requestAnimationFrame(gameLoop);
}

// ── MENUS ─────────────────────────────────────────────────────────────────────
const SELECT_ITEMS=['sm-resume','sm-restart','diff-row','sm-reset'];
const PAUSE_ITEMS=['pm-resume','pm-exit'];
let menuFocusIdx=0;

function getActiveMenu(){
  if(document.getElementById('select-menu').style.display==='flex') return 'select';
  if(document.getElementById('pause-menu').style.display==='flex')  return 'pause';
  return null;
}
function menuItems(){const m=getActiveMenu();return m==='select'?SELECT_ITEMS:m==='pause'?PAUSE_ITEMS:[];}
function clearMenuFocus(){document.querySelectorAll('.menu-btn.focused,.diff-btn.focused').forEach(el=>el.classList.remove('focused'));}
function applyMenuFocus(){
  clearMenuFocus();const items=menuItems();if(!items.length)return;
  const id=items[menuFocusIdx];
  if(id==='diff-row'){const sel=document.querySelector('.diff-btn.selected');if(sel)sel.classList.add('focused');}
  else{const el=document.getElementById(id);if(el)el.classList.add('focused');}
}
function menuNavigate(dir){const items=menuItems();if(!items.length)return;menuFocusIdx=(menuFocusIdx+dir+items.length)%items.length;applyMenuFocus();}
function menuSelect(){const items=menuItems();if(!items.length)return;const id=items[menuFocusIdx];if(id==='diff-row')return;const el=document.getElementById(id);if(el)el.click();}
function menuDiffChange(dir){const items=menuItems();if(!items.length||items[menuFocusIdx]!=='diff-row')return;const diffs=['easy','normal','hard'];const cur=diffs.indexOf(difficulty);const next=diffs[Math.max(0,Math.min(2,cur+dir))];document.getElementById('diff-'+next).click();applyMenuFocus();}
function resetMenuFocus(){menuFocusIdx=0;applyMenuFocus();}

function showSelectMenu(){
  if(gameState!=='playing'&&gameState!=='gameover')return;
  menuOpen=true;
  const sm=document.getElementById('select-menu');
  sm.style.display='flex';
  ['easy','normal','hard'].forEach(d=>document.getElementById('diff-'+d).classList.toggle('selected',d===difficulty));
  resetMenuFocus();
}
function hideSelectMenu(){
  menuOpen=false;
  document.getElementById('select-menu').style.display='none';
  Object.keys(keys).forEach(k=>delete keys[k]);
}
function showPauseMenu(){
  if(gameState!=='playing')return;
  menuOpen=true;
  document.getElementById('pause-menu').style.display='flex';
  resetMenuFocus();
}
function hidePauseMenu(){
  menuOpen=false;
  document.getElementById('pause-menu').style.display='none';
  Object.keys(keys).forEach(k=>delete keys[k]);
}

document.getElementById('sm-resume').addEventListener('click',hideSelectMenu);
document.getElementById('sm-restart').addEventListener('click',()=>{hideSelectMenu();startGame();});
document.getElementById('sm-reset').addEventListener('click',()=>{
  highScore=0;localStorage.removeItem('pt_hiscore');
  document.getElementById('sm-reset').textContent='Score Reset ✓';
  setTimeout(()=>document.getElementById('sm-reset').textContent='Reset High Score',1500);
});
['easy','normal','hard'].forEach(d=>{
  document.getElementById('diff-'+d).addEventListener('click',()=>{
    difficulty=d;localStorage.setItem('pt_difficulty',d);
    ['easy','normal','hard'].forEach(x=>document.getElementById('diff-'+x).classList.toggle('selected',x===d));
    applyMenuFocus();
  });
});
document.getElementById('pm-resume').addEventListener('click',hidePauseMenu);
document.getElementById('pm-exit').addEventListener('click',()=>{
  menuOpen=false; gameState='idle'; lasers.length=0; enemies=[];
  Object.keys(keys).forEach(k=>delete keys[k]);
  Object.keys(dpad).forEach(k=>dpad[k]=false);
  hidePauseMenu();
  _exitGame();
});

// ── START / SELECT BUTTONS ────────────────────────────────────────────────────
const btnStart=document.getElementById('btn-start');
const btnSelect=document.getElementById('btn-select');

function handleStart(){
  if(!document.body.classList.contains('game-mode')) _launchGame();
  else if(gameState==='idle'||gameState==='gameover') startGame();
  else showPauseMenu();
}
function handleSelect(){
  const m=getActiveMenu();
  if(m==='pause') hidePauseMenu();
  else if(m==='select') hideSelectMenu();
  else showSelectMenu();
}

function addBtn(el,fn){
  el.addEventListener('click',fn);
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();el.classList.remove('pressed');fn();},{passive:false});
  el.addEventListener('pointerdown',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();el.classList.add('pressed');}});
  el.addEventListener('pointerup',e=>{if(e.pointerType==='touch' || e.pointerType==='pen'){e.preventDefault();e.stopPropagation();el.classList.remove('pressed');fn();}});
  el.addEventListener('mousedown',()=>el.classList.add('pressed'));
  el.addEventListener('mouseup',()=>el.classList.remove('pressed'));
  el.addEventListener('mouseleave',()=>el.classList.remove('pressed'));
}
addBtn(btnStart,handleStart);
addBtn(btnSelect,handleSelect);

gameCanvas.addEventListener('click',()=>{if(gameState==='gameover')startGame();});

window.addEventListener('keydown',e=>{
  const inMenu=getActiveMenu();
  if(inMenu){
    if(['ArrowUp','w','W'].includes(e.key)){e.preventDefault();menuNavigate(-1);return;}
    if(['ArrowDown','s','S'].includes(e.key)){e.preventDefault();menuNavigate(1);return;}
    if(['ArrowLeft','a','A'].includes(e.key)){e.preventDefault();menuDiffChange(-1);return;}
    if(['ArrowRight','d','D'].includes(e.key)){e.preventDefault();menuDiffChange(1);return;}
    if(e.key==='Enter'){e.preventDefault();menuSelect();return;}
    if(e.key==='Escape'){e.preventDefault();inMenu==='select'?hideSelectMenu():hidePauseMenu();return;}
    e.preventDefault();return;
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
  if(e.key==='Enter'){
    if(!document.body.classList.contains('game-mode')) _launchGame();
    else handleStart();
  }
  if(e.key==='Shift'){e.preventDefault();handleSelect();}
  if(e.key==='Escape'&&gameState==='playing') showPauseMenu();
});

window.addEventListener('keyup',e=>{delete keys[e.key];});

// ── LAUNCH ────────────────────────────────────────────────────────────────────
// Reset timing when tab regains focus to prevent speed burst
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden) lastTime = 0;
});
window.addEventListener('focus', ()=>{ lastTime = 0; });
window.addEventListener('blur',  ()=>{ lastTime = 0; });

function _launchGame(){
  if(document.body.classList.contains('game-mode')){
    startGame();
    return;
  }

  const hw = document.querySelector('.handheld-wrapper');
  if(hw) {
    const rect = hw.getBoundingClientRect();
    // Calculate scale to fit viewport with padding
    const scaleX = (window.innerWidth  * 0.88) / rect.width;
    const scaleY = (window.innerHeight * 0.92) / rect.height;
    const scale  = Math.min(scaleX, scaleY, 1.6); // cap at 1.6x

    // Calculate translation to center in viewport
    // getBoundingClientRect gives current viewport position
    // We want center of handheld to be at center of viewport
    const hwCX = rect.left + rect.width  / 2;
    const hwCY = rect.top  + rect.height / 2;
    const vpCX = window.innerWidth  / 2;
    const vpCY = window.innerHeight / 2;

    // translate() then scale() — translate is in pre-scale coords
    const tx = (vpCX - hwCX) / scale;
    const ty = (vpCY - hwCY) / scale;

    hw.style.transition   = 'transform 0.5s ease';
    hw.style.transformOrigin = 'center center';
    hw.style.transform    = `scale(${scale}) translate(${tx}px, ${ty}px)`;
  }

  document.documentElement.classList.add('game-mode');
  document.body.classList.add('game-mode');

  // Lock scroll position - save current and restore on any scroll attempt
  const _scrollY = window.scrollY;
  const _lockScroll = ()=>{ if(document.body.classList.contains('game-mode')) window.scrollTo(0,_scrollY); };
  window.addEventListener('scroll', _lockScroll, {passive:true});
  // Store so we can remove on exit
  window._scrollLock = _lockScroll;
  window._scrollLockY = _scrollY;

  // Wait for zoom + CSS transition then start game
  setTimeout(()=>{
    resizeGameCanvas();
    startGame();
    requestAnimationFrame(gameLoop);
  }, 550);
}

function _exitGame(){
  const hw = document.querySelector('.handheld-wrapper');
  if(hw){
    hw.style.transition = 'transform 0.4s ease';
    hw.style.transform  = '';
    setTimeout(()=>{ hw.style.transition=''; }, 400);
  }
  document.documentElement.classList.remove('game-mode');
  document.body.classList.remove('game-mode');
  if(window._scrollLock){
    window.removeEventListener('scroll', window._scrollLock, {passive:true});
    window._scrollLock = null;
  }

}

const playButton = document.getElementById('play-button');
if (playButton) {
  playButton.addEventListener('click', _launchGame);
}
const handheldImage = document.querySelector('.handheld-wrapper .device');
if (handheldImage) {
  const showDevice = () => { handheldImage.closest('.handheld-wrapper').style.opacity = '1'; };
  handheldImage.addEventListener('load', showDevice);
  if (handheldImage.complete) showDevice();
}
window.launchGame=_launchGame;

})();
</script>
<script>
(function(){
  const wrapper = document.querySelector('.handheld-wrapper');
  const controls = {
    'dpad-zone': { left: 35, top: 418, width: 103, height: 103 },
    'btn-select': { left: 159, top: 581, width: 50, height: 21 },
    'btn-start': { left: 225, top: 581, width: 50, height: 21 },
    'btn-a': { left: 254, top: 458, width: 51, height: 51 },
    'btn-b': { left: 330, top: 433, width: 51, height: 51 },
  };

  function updateControlPositions() {
    if (!wrapper) return;
    const wrapperWidth = wrapper.clientWidth;
    const wrapperHeight = wrapper.clientHeight;
    if (!wrapperWidth || !wrapperHeight) return;

    Object.entries(controls).forEach(([id, dims]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.left = `${(dims.left / wrapperWidth) * 100}%`;
      el.style.top = `${(dims.top / wrapperHeight) * 100}%`;
      el.style.width = `${(dims.width / wrapperWidth) * 100}%`;
      el.style.height = `${(dims.height / wrapperHeight) * 100}%`;
    });
  }

  const resizeObserver = window.ResizeObserver ? new ResizeObserver(updateControlPositions) : null;
  if (resizeObserver && wrapper) resizeObserver.observe(wrapper);
  window.addEventListener('resize', updateControlPositions);
  window.addEventListener('load', updateControlPositions);
  updateControlPositions();
})();
</script>
